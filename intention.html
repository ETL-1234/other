<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Intention Box</title>

<link href="https://fonts.googleapis.com/css2?family=Bad+Script&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #F8F3EF;
    overflow: hidden; /* removes all scrollbars */
    font-family: 'Inter', sans-serif;
  }

 
  .wrapper {
    width: 100%;
    max-width: 600px;
    margin-top: 0;
    margin: 0 auto;
    padding: 20px 20px 0;
    box-sizing: border-box;
    position: relative;
  }

  @media (min-width: 768px) {
    .wrapper {
      padding: 0 40px;
    }
  }

  .card {
    background: #F8F3EF;
    border-radius: 16px;
    min-height: 160px;
    margin-top: 0px;
    padding: 20px 16px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    font-size: 18px;
    font-family: 'Bad Script', cursive;
    text-align: center;
    overflow: hidden;
    line-height: 1.5;
  }

  textarea::placeholder {
    color: #000;
    opacity: 0.6;
  }

  /* animation */
  .step {
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.35s ease;
  }

  .step.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .hidden {
    display: none;
  }

  /* reset upper right */
  .reset {
  position: absolute;
  top: 4px;
  right: 20px;
  font-size: 14px;
  color: #5c6b5c;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="card">

    <div id="step1" class="step visible">
      <textarea id="input1" rows="1" placeholder="Set your intention"></textarea>
    </div>

    <div id="step2" class="step hidden">
      <textarea id="input2" rows="1" placeholder="Choose your next action"></textarea>
    </div>

    <div id="step3" class="step hidden">
      <textarea id="input3" rows="1" placeholder="Define your mindset"></textarea>
    </div>

  </div>

  <!-- reset under box -->
  <div class="reset" onclick="resetAll()">Reset</div>

</div>

<script>

const input1 = document.getElementById("input1");
const input2 = document.getElementById("input2");
const input3 = document.getElementById("input3");

const step2 = document.getElementById("step2");
const step3 = document.getElementById("step3");

// --- AUTO RESIZE ---
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

// --- SAFE SAVE (fix for Draftbit timing issues) ---
function saveData() {
  try {
    localStorage.setItem("intention1", input1.value || "");
    localStorage.setItem("intention2", input2.value || "");
    localStorage.setItem("intention3", input3.value || "");
  } catch(e) {}
}

// --- LOAD ---
function loadData() {
  const val1 = localStorage.getItem("intention1") || "";
  const val2 = localStorage.getItem("intention2") || "";
  const val3 = localStorage.getItem("intention3") || "";

  input1.value = val1;
  input2.value = val2;
  input3.value = val3;

  autoResize(input1);
  autoResize(input2);
  autoResize(input3);

  if (val1.trim()) showStep(step2);
  if (val2.trim()) showStep(step3);
}

// --- SHOW STEP ---
function showStep(step) {
  if (!step.classList.contains("visible")) {
    step.classList.remove("hidden");

    // force reflow so animation always triggers
    step.offsetHeight;

    step.classList.add("visible");
  }
}

// --- EVENTS ---
[input1, input2, input3].forEach(input => {
  input.addEventListener("input", (e) => handleInput(e));
  input.addEventListener("blur", (e) => handleInput(e));
});

function handleInput(e) {
   autoResize(e.target);
  saveData();

  if (input1.value.trim()) {
    showStep(step2);
  }

  if (input2.value.trim()) {
    showStep(step3);
  }
}
  
// --- RESET ---
function resetAll() {
  input1.value = "";
  input2.value = "";
  input3.value = "";

  localStorage.removeItem("intention1");
  localStorage.removeItem("intention2");
  localStorage.removeItem("intention3");

  autoResize(input1);
  autoResize(input2);
  autoResize(input3);

  step2.classList.remove("visible");
  step3.classList.remove("visible");

    step2.classList.add("hidden");
    step3.classList.add("hidden");

  input1.focus();
  }

// --- INIT ---
window.onload = () => {
  loadData();

  setTimeout(() => {
    input1.focus();
  }, 300);
};

</script>

</body>
</html>
