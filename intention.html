<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Intention Box</title>

<link href="https://fonts.googleapis.com/css2?family=Bad+Script&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
  }

  .wrapper {
    width: 100%;
    max-width: 600px;
    padding: 0 20px;
    box-sizing: border-box;
  }

  @media (min-width: 768px) {
    .wrapper {
      padding: 0 40px;
    }
  }

  .card {
    background: #F8F3EF;
    border-radius: 16px;
    min-height: 160px;
    padding: 20px 16px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }

  .prompt {
    font-family: 'Bad Script', cursive;
    font-size: 18px;
    color: #000;
    text-align: center;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    font-size: 16px;
    font-family: 'Bad Script', cursive;
    text-align: center;
    overflow: hidden;
    line-height: 1.4;
  }

  textarea::placeholder {
    color: #999;
  }

  /* Animation */
  .step {
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.35s ease;
  }

  .step.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .hidden {
    display: none;
  }

  .reset-container {
    width: 100%;
    max-width: 600px;
    padding: 8px 20px 0;
    box-sizing: border-box;
    display: flex;
    justify-content: flex-end;
  }

  @media (min-width: 768px) {
    .reset-container {
      padding: 8px 40px 0;
    }
  }

  .reset {
    font-size: 16px;
    color: #000;
    cursor: pointer;
  }

</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <!-- STEP 1 -->
    <div id="step1" class="step visible">
      <div class="prompt">Set your intention</div>
      <textarea id="input1" rows="1"></textarea>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step hidden">
      <div class="prompt">Choose your next action</div>
      <textarea id="input2" rows="1"></textarea>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="step hidden">
      <div class="prompt">Choose your mindset</div>
      <textarea id="input3" rows="1"></textarea>
    </div>

  </div>
</div>

<div class="reset-container">
  <div class="reset" onclick="resetAll()">Reset</div>
</div>

<script>

const input1 = document.getElementById("input1");
const input2 = document.getElementById("input2");
const input3 = document.getElementById("input3");

const step2 = document.getElementById("step2");
const step3 = document.getElementById("step3");

// --- AUTO RESIZE ---
function autoResize(el) {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

// --- SAVE ---
function saveData() {
  localStorage.setItem("intention1", input1.value);
  localStorage.setItem("intention2", input2.value);
  localStorage.setItem("intention3", input3.value);
}

// --- LOAD ---
function loadData() {
  input1.value = localStorage.getItem("intention1") || "";
  input2.value = localStorage.getItem("intention2") || "";
  input3.value = localStorage.getItem("intention3") || "";

  autoResize(input1);
  autoResize(input2);
  autoResize(input3);

  if (input1.value.trim()) {
    showStep(step2);
  }

  if (input2.value.trim()) {
    showStep(step3);
  }
}

// --- SHOW STEP WITH ANIMATION ---
function showStep(step) {
  step.classList.remove("hidden");
  setTimeout(() => {
    step.classList.add("visible");
  }, 10);
}

// --- INPUT EVENTS ---
[input1, input2, input3].forEach(input => {
  input.addEventListener("input", () => {
    autoResize(input);
    saveData();
  });
});

input1.addEventListener("input", () => {
  if (input1.value.trim().length > 0) {
    showStep(step2);
  }
});

input2.addEventListener("input", () => {
  if (input2.value.trim().length > 0) {
    showStep(step3);
  }
});

// --- RESET ---
function resetAll() {
  input1.value = "";
  input2.value = "";
  input3.value = "";

  localStorage.clear();

  autoResize(input1);
  autoResize(input2);
  autoResize(input3);

  step2.classList.remove("visible");
  step3.classList.remove("visible");

  setTimeout(() => {
    step2.classList.add("hidden");
    step3.classList.add("hidden");
  }, 300);
}

// --- INIT ---
window.onload = () => {
  loadData();

  // Force focus fix for WebView
  setTimeout(() => {
    input1.focus();
  }, 300);
};

</script>

</body>
</html>
